<!-- TOPBAR -->
<header class="topbar">
  <div class="breadcrumb">
    <a href="#">Home</a>
    <span class="sep">›</span>
    <span class="current">My Dashboard</span>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" title="Alerts">
      <div class="notif-dot"></div>
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M10 2a6 6 0 016 6c0 3.5 1.5 5 1.5 5h-15S4 11.5 4 8a6 6 0 016-6z"/><path d="M8.5 17a1.5 1.5 0 003 0"/></svg>
    </button>
    <button class="help-btn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><path d="M8 8a2 2 0 114 0c0 1.5-2 2-2 3"/><circle cx="10" cy="15" r="0.5" fill="currentColor"/></svg>
      Help
    </button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">☀️</button>
    <div class="user-btn">
      <div class="avatar">{{ initials }}</div>
      {{ user.full_name.split()[0] }}
    </div>
  </div>
</header>
