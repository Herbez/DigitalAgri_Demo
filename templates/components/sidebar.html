<!-- ── SIDEBAR ── -->

  <div class="sidebar-logo">

        <circle cx="10" cy="10" r="3.5" stroke="white" stroke-width="1.8"/>
        <line x1="10" y1="2" x2="10" y2="5.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="10" y1="14.5" x2="10" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="2" y1="10" x2="5.5" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="14.5" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="4.2" y1="4.2" x2="6.5" y2="6.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="13.5" y1="13.5" x2="15.8" y2="15.8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="15.8" y1="4.2" x2="13.5" y2="6.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="6.5" y1="13.5" x2="4.2" y2="15.8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-name"><span>Digital</span>Agri</div>
  </div>

  <div class="sidebar-nav">
    <div class="sidebar-section">
      <div class="sidebar-section-label active" onclick="toggleSection(this)">Main</div>
      <div class="nav-items">
        <a class="nav-item active" href="{{ url_for('dashboard') }}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="2" y="2" width="7" height="7" rx="2"/><rect x="11" y="2" width="7" height="7" rx="2"/><rect x="2" y="11" width="7" height="7" rx="2"/><rect x="11" y="11" width="7" height="7" rx="2"/></svg>
          Dashboard
        </a>
        <a class="nav-item" href="{{ url_for('dashboard') }}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M10 2L2 7v11h16V7L10 2z"/><path d="M8 18v-6h4v6"/></svg>
          Get Recommendations
          <span class="nav-badge">3</span>
        </a>
        <a class="nav-item" href="{{ url_for('planting_calendar') }}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l3 3"/></svg>
          Planting Calendar
        </a>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Information</div>

        <a class="nav-item" href="#">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="10" r="3"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>
          Weather Forecast
        </a>

        <a class="nav-item" href="#">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 6l7-4 7 4v8l-7 4-7-4V6z"/><path d="M10 2v18M3 6l7 4 7-4"/></svg>
          Market Prices
        </a>

        <a class="nav-item" href="#">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 2H6a2 2 0 00-2 2v14a2 2 0 002 2h8a2 2 0 002-2V6l-4-4z"/><polyline points="14,2 14,6 18,6"/></svg>
          My History
        </a>
    </div>

    <div class="sidebar-bottom">
      <a class="nav-item" href="#">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="7" r="3.5"/><path d="M3 18c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>
        Account Settings
      </a>
      <form action="{{ url_for('logout') }}" method="post" style="display:none">
        <button type="submit" id="logoutForm"></button>
      </form>
      <a class="nav-item logout" href="#" onclick="document.getElementById('logoutForm').click(); return false;">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M7 3H4a1 1 0 00-1 1v12a1 1 0 001 1h3"/><polyline points="13,14 17,10 13,6"/><line x1="17" y1="10" x2="7" y2="10"/></svg>
        Log out
      </a>
    </div>
  </div>

  <script>
  function toggleSection(label) {
    const navItems = label.nextElementSibling;
    const allLabels = document.querySelectorAll('.sidebar-section-label');
    const allNavItems = document.querySelectorAll('.nav-items');
    
    // Toggle current section
    label.classList.toggle('active');
    navItems.classList.toggle('collapsed');
    
    // If activating this section, collapse all other sections
    if (label.classList.contains('active')) {
      allLabels.forEach(l => {
        if (l !== label) {
          l.classList.remove('active');
          l.nextElementSibling.classList.add('collapsed');
        }
      });
    }
  }
  
  // Auto-detect current page and set active states
  document.addEventListener('DOMContentLoaded', function() {
    const currentPath = window.location.pathname;
    const allLabels = document.querySelectorAll('.sidebar-section-label');
    const allNavItems = document.querySelectorAll('.nav-items');
    const allNavLinks = document.querySelectorAll('.nav-item');
    
    // Remove all active states first
    allLabels.forEach(l => l.classList.remove('active'));
    allNavItems.forEach(n => n.classList.add('collapsed'));
    allNavLinks.forEach(l => l.classList.remove('active'));
    
    // Determine which section should be active based on current path
    let activeSection = null;
    let activeNavItemsContainer = null;
    let activeNavLink = null;
    
    if (currentPath.includes('dashboard')) {
      activeSection = document.querySelector('.sidebar-section-label:nth-of-type(1)');
      activeNavItemsContainer = document.querySelector('.sidebar-section:nth-of-type(1) .nav-items');
      activeNavLink = document.querySelector('.nav-item[href*="dashboard"]');
    } else if (currentPath.includes('planting-calendar')) {
      activeSection = document.querySelector('.sidebar-section-label:nth-of-type(1)');
      activeNavItemsContainer = document.querySelector('.sidebar-section:nth-of-type(1) .nav-items');
      activeNavLink = document.querySelector('.nav-item[href*="planting-calendar"]');
    } else {
      // Default to first section
      activeSection = document.querySelector('.sidebar-section-label:nth-of-type(1)');
      activeNavItemsContainer = document.querySelector('.sidebar-section:nth-of-type(1) .nav-items');
    }
    
    // Set active states
    if (activeSection && activeNavItemsContainer) {
      activeSection.classList.add('active');
      activeNavItemsContainer.classList.remove('collapsed');
    }
    
    if (activeNavLink) {
      activeNavLink.classList.add('active');
    }
    
    // Create overlay element if it doesn't exist
    if (!document.querySelector('.sidebar-overlay')) {
      const overlay = document.createElement('div');
      overlay.className = 'sidebar-overlay';
      overlay.onclick = toggleMobileMenu;
      document.querySelector('.app').appendChild(overlay);
    }
  });
  </script>
</aside>
